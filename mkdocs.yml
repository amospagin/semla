site_name: semla
site_description: Structural Equation Modeling with lavaan-style syntax for Python
site_url: https://amospagin.github.io/semla
repo_url: https://github.com/amospagin/semla
repo_name: amospagin/semla

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - toc.follow
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - User Guide:
    - CFA: guide/cfa.md
    - SEM: guide/sem.md
    - Multi-Group Analysis: guide/multigroup.md
    - Ordinal Data (DWLS): guide/dwls.md
  - API Reference: api.md
  - Coming from lavaan?: lavaan-migration.md
  - Roadmap: roadmap.md
